name: Build and publish Docker image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  mutation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Stryker on current revision
        id: stryker_pr
        run: |
          set +e
          dotnet stryker --config-file stryker-config.json --output StrykerOutput/pr --break-at 0
          EXIT_CODE=$?
          set -e

          REPORT_PATH=$(find StrykerOutput/pr -name mutation-report.json -print -quit)
          if [ -z "$REPORT_PATH" ]; then
            echo "Could not find mutation-report.json for current revision"
            exit 1
          fi

          SCORE=$(jq -r '(.mutationScore // .projectMetrics.mutationScore // .metrics.mutationScore // empty)' "$REPORT_PATH")
          if [ -z "$SCORE" ] || [ "$SCORE" = "null" ]; then
            echo "Could not parse mutation score from $REPORT_PATH"
            exit 1
          fi

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

      - name: Run Stryker on main for comparison
        id: stryker_main
        if: github.event_name == 'pull_request'
        run: |
          CURRENT_SHA="$GITHUB_SHA"
          git fetch origin main --depth=1
          git checkout --detach origin/main
          dotnet restore

          set +e
          dotnet stryker --config-file stryker-config.json --output StrykerOutput/main --break-at 0
          EXIT_CODE=$?
          set -e

          REPORT_PATH=$(find StrykerOutput/main -name mutation-report.json -print -quit)
          if [ -z "$REPORT_PATH" ]; then
            echo "Could not find mutation-report.json for main"
            exit 1
          fi

          SCORE=$(jq -r '(.mutationScore // .projectMetrics.mutationScore // .metrics.mutationScore // empty)' "$REPORT_PATH")
          if [ -z "$SCORE" ] || [ "$SCORE" = "null" ]; then
            echo "Could not parse mutation score from $REPORT_PATH"
            exit 1
          fi

          git checkout --detach "$CURRENT_SHA"

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

      - name: Enforce mutation gates
        run: |
          PR_EXIT='${{ steps.stryker_pr.outputs.exit_code }}'
          PR_SCORE='${{ steps.stryker_pr.outputs.score }}'

          echo "Current mutation score: $PR_SCORE"

          if [ "$PR_EXIT" -ne 0 ]; then
            echo "Stryker failed on current revision with exit code $PR_EXIT"
            exit 1
          fi

          awk "BEGIN {exit !($PR_SCORE < 75)}" && {
            echo "Mutation score $PR_SCORE is below the minimum threshold of 75"
            exit 1
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MAIN_EXIT='${{ steps.stryker_main.outputs.exit_code }}'
            MAIN_SCORE='${{ steps.stryker_main.outputs.score }}'

            echo "Main mutation score: $MAIN_SCORE"

            if [ "$MAIN_EXIT" -ne 0 ]; then
              echo "Stryker failed on main with exit code $MAIN_EXIT"
              exit 1
            fi

            # -----------------------------------------------------------------
            # MIGHT DELETE THIS IN FUTURE IF IT CAUSES TOO MUCH HEADACHE
            # Compares the current PR mutation score against main and fails if
            # the score regresses, even when it still stays above the baseline.
            # -----------------------------------------------------------------
            awk "BEGIN {exit !($PR_SCORE < $MAIN_SCORE)}" && {
              echo "Mutation score regressed: current $PR_SCORE < main $MAIN_SCORE"
              exit 1
            }
          fi

      - name: Publish Stryker reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-reports-${{ github.run_id }}
          path: StrykerOutput/

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --verbosity normal

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
