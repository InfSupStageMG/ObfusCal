name: Build and publish Docker image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  mutation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Stryker on current revision
        id: stryker_pr
        run: |
          set +e
          dotnet stryker --config-file stryker-config.json --output StrykerOutput/pr --break-at 0
          EXIT_CODE=$?
          set -e

          REPORT_PATH=$(find StrykerOutput/pr -name mutation-report.json -print -quit)
          if [ -z "$REPORT_PATH" ]; then
            echo "Could not find mutation-report.json for current revision"
            exit 1
          fi

          SCORE=$(jq -r '(.mutationScore // .projectMetrics.mutationScore // .metrics.mutationScore // empty)' "$REPORT_PATH")
          if [ -z "$SCORE" ] || [ "$SCORE" = "null" ]; then
            echo "Could not parse mutation score from $REPORT_PATH"
            exit 1
          fi

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

      - name: Publish Stryker reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-reports-${{ github.run_id }}
          path: StrykerOutput/

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --verbosity normal

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
