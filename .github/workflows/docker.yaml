name: Build and publish Docker image

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Setup .NET
                uses: actions/setup-dotnet@v5
                with:
                    global-json-file: global.json

            -   name: Restore dependencies
                run: dotnet restore

            -   name: Run tests
                run: |
                    dotnet test \
                      --no-restore \
                      --verbosity normal \
                      --logger "trx;LogFileName=test-results.trx" \
                      --logger "html;LogFileName=test-results.html" \
                      --results-directory ./TestResults

            -   name: Generate Rich Test Summary
                if: always()
                run: python3 .github/scripts/generate_test_summary.py

            -   name: Generate Test Catalog
                if: always()
                run: python3 .github/scripts/generate_test_catalog.py

            -   name: Upload Test Results Artifact
                if: always()
                uses: actions/upload-artifact@v7
                with:
                    name: test-reports
                    path: |
                        ./TestResults/test-results.trx
                        ./TestResults/test-results.html
                        ./TestResults/test-catalog.md
                    retention-days: 14

    publish-test-catalog:
        runs-on: ubuntu-latest
        needs: [ test ]
        if: github.event_name == 'pull_request'
        permissions:
            contents: write
        steps:
            -   uses: actions/checkout@v6
                with:
                    ref: ${{ github.head_ref }}
            -   uses: actions/download-artifact@v8
                with:
                    name: test-reports
                    path: ./downloaded
            -   name: Commit test catalog to PR branch
                run: |
                    cp ./downloaded/test-catalog.md docs/test-catalog.md
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git add docs/test-catalog.md
                    git diff --cached --quiet && exit 0
                    git commit -m "chore: update test catalog [skip ci]"
                    git push

    deploy-docs:
        runs-on: ubuntu-latest
        needs: [ test ]
        if: github.event_name == 'push'
        permissions:
            contents: write
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Download test reports artifact
                uses: actions/download-artifact@v8
                with:
                    name: test-reports
                    path: ./downloaded

            -   name: Inject fresh test catalog into docs
                run: cp ./downloaded/test-catalog.md docs/test-catalog.md

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: '3.x'

            -   name: Install MkDocs Material
                run: pip install mkdocs-material

            -   name: Deploy docs to GitHub Pages
                run: |
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    mkdocs gh-deploy --force

    container-smoke:
        runs-on: ubuntu-latest
        needs: test

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Build runtime image
                run: docker build -t obfuscal-api:ci .

            -   name: Start postgres for smoke test
                run: |
                    docker network create obfuscal-ci
                    docker run -d --name obfuscal-ci-db --network obfuscal-ci \
                      -e POSTGRES_USER=postgres \
                      -e POSTGRES_PASSWORD=postgres \
                      -e POSTGRES_DB=obfuscal \
                      --health-cmd="pg_isready -U postgres" \
                      --health-interval=5s \
                      --health-timeout=5s \
                      --health-retries=20 \
                      postgres:18

            -   name: Wait for postgres health
                run: |
                    for i in {1..30}; do
                      state=$(docker inspect --format='{{json .State.Health.Status}}' obfuscal-ci-db)
                      if [ "$state" = '"healthy"' ]; then
                        exit 0
                      fi
                      sleep 2
                    done
                    docker logs obfuscal-ci-db
                    exit 1

            -   name: Start API container
                run: |
                    docker run -d --name obfuscal-ci-api --network obfuscal-ci -p 18080:8080 \
                      -e ASPNETCORE_ENVIRONMENT=Development \
                      -e ASPNETCORE_URLS=http://+:8080 \
                      -e ConnectionStrings__DefaultConnection='Host=obfuscal-ci-db;Database=obfuscal;Username=postgres;Password=postgres' \
                      -e AzureAd__TenantId='11111111-1111-1111-1111-111111111111' \
                      -e AzureAd__ClientId='22222222-2222-2222-2222-222222222222' \
                      -e AzureAd__ClientSecret='smoke-test-placeholder' \
                      -e GraphConsent__ClientId='33333333-3333-3333-3333-333333333333' \
                      -e ColumnEncryption__Key='AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' \
                      obfuscal-api:ci

            -   name: Smoke test health endpoint
                run: |
                    for i in {1..40}; do
                      if curl -fsS http://localhost:18080/health > /dev/null; then
                        exit 0
                      fi
                      sleep 2
                    done
                    docker logs obfuscal-ci-api
                    exit 1

            -   name: Cleanup smoke test containers
                if: always()
                run: |
                    docker rm -f obfuscal-ci-api obfuscal-ci-db || true
                    docker network rm obfuscal-ci || true

    mutation-testing:
        runs-on: ubuntu-latest
        needs: [ test ]

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            -   name: Setup .NET
                uses: actions/setup-dotnet@v5
                with:
                    global-json-file: global.json

            -   name: Restore dependencies
                run: dotnet restore

            -   name: Build solution
                run: dotnet build --no-restore --no-incremental

            -   name: Install Stryker .NET tool
                run: dotnet tool restore

            -   name: Run Stryker mutation tests
                env:
                    STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
                run: |
                    if [ "${{ github.event_name }}" = "pull_request" ]; then
                      ISSUE="${{ github.head_ref }}"
                    else
                      ISSUE="${{ github.ref_name }}"
                    fi
                    COMMIT=$(git log -1 --format=%s | tr ' ' '-')
                    VERSION="${ISSUE}/${COMMIT}"
                    dotnet stryker --version "$VERSION"

    build:
        runs-on: ubuntu-latest
        needs: [ test, container-smoke ]
        permissions:
            contents: read
            packages: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Log in to GHCR
                if: github.event_name == 'push'
                uses: docker/login-action@v4
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Extract metadata
                id: meta
                uses: docker/metadata-action@v6
                with:
                    images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                    tags: |
                        type=raw,value=latest,enable=${{ github.event_name == 'push' }}
                        type=sha,format=short

            -   name: Build and push
                uses: docker/build-push-action@v7
                with:
                    context: .
                    push: ${{ github.event_name == 'push' }}
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
