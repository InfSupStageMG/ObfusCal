services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: obfuscal-proxy
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/nginx:/etc/nginx/certs:ro
    networks:
      - internal

  api:
    build: .
    container_name: obfuscal-api
    expose:
      - "8443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8443
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/api.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${API_CERT_PASSWORD}
    volumes:
      - ./certs/api:/https:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge
