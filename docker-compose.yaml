services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  reverse-proxy:
    image: nginx:1.31-alpine
    container_name: obfuscal-proxy
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/nginx:/etc/nginx/certs:ro
    networks:
      - internal

  api:
    build: .
    container_name: obfuscal-api
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${API_MEM_LIMIT:-512m}
    cpus: ${API_CPUS:-4.0}
    expose:
      - "8443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - AZUREAD__TENANTID=${AZUREAD__TENANTID}
      - AZUREAD__CLIENTID=${AZUREAD__CLIENTID}
      - AZUREAD__CLIENTSECRET=${AZUREAD__CLIENTSECRET}
      - GRAPHCONSENT__CLIENTID=${GRAPHCONSENT__CLIENTID}
      - GRAPHCONSENT__CLIENTSECRET=${GRAPHCONSENT__CLIENTSECRET}
      - GOOGLECONSENT__CLIENTID=${GOOGLECONSENT__CLIENTID}
      - GOOGLECONSENT__CLIENTSECRET=${GOOGLECONSENT__CLIENTSECRET}
      - GOOGLECONSENT__REDIRECTURI=${GOOGLECONSENT__REDIRECTURI}
      - SYNC__INSTANCEID=${SYNC__INSTANCEID}
      - SYNC__APIKEY=${SYNC__APIKEY}
      - COLUMNENCRYPTION__KEY=${COLUMNENCRYPTION__KEY}
      - PEERTRANSPORTSECURITY__ALLOWSELFSIGNEDCERTS=true
      - ASPNETCORE_URLS=https://+:8443
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/api.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${API_CERT_PASSWORD}
    volumes:
      - ./certs/api:/https:ro
      - ./plugins:/app/plugins:ro
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

networks:
  internal:
    driver: bridge

